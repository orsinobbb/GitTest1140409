<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>迷宮挑戰 v1.6 - 360度全向搖桿版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none; /* 防止畫面滾動 */
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at 50% 0%, #e0eafc 0%, #cfdef3 100%);
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 30;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      min-width: 190px;
      max-width: min(84vw, 240px);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
      transform-origin: top left;
      pointer-events: auto;
    }

    #ui.minimized {
      transform: scale(0.65);
      opacity: 0.4;
    }

    #ui.minimized:hover {
      transform: scale(1);
      opacity: 1;
    }

    #ui h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
      line-height: 1.2;
      color: #1e293b;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    #ui .ver {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #ui .row {
      margin: 5px 0;
      font-size: 14px;
      color: #334155;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
    }

    #ui .row span {
      font-weight: 700;
      color: #0f172a;
    }

    #ui .legend {
      margin-top: 10px;
      font-size: 12px;
      color: #475569;
      text-align: center;
      background: rgba(255,255,255,0.5);
      padding: 4px;
      border-radius: 6px;
    }

    #ui button {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #ui button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: translate(-50%, -30%) scale(0.8); }
      70% { transform: translate(-50%, -50%) scale(1.05); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    #centerMessage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
      display: none;
      white-space: nowrap;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.1);
    }

    #centerMessage.show {
      display: block;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    canvas { display: block; }

    /* 全向虛擬搖桿樣式 */
    #joystick-zone {
      position: absolute;
      left: 20px;
      bottom: 20px;
      z-index: 35;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1), inset 0 2px 8px rgba(255,255,255,0.5);
    }

    #joystick-knob {
      width: 56px;
      height: 56px;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb);
      border-radius: 50%;
      box-shadow: 0 6px 16px rgba(37,99,235,0.4), inset 0 -2px 6px rgba(0,0,0,0.3);
      pointer-events: none; /* 讓事件穿透到 zone */
      transform: translate(0px, 0px);
    }

    /* 搖桿回彈動畫 */
    #joystick-knob.snap-back {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (min-width: 769px) {
      #ui { left: 24px; top: 24px; min-width: 230px; }
      #joystick-zone { left: 32px; bottom: 32px; width: 160px; height: 160px; }
      #joystick-knob { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>🧩 迷宮三關挑戰</h1>
    <div class="ver">v1.6 360° Joystick Edition</div>
    <div class="row">關卡進度 <span><span id="levelText">1</span> / 3</span></div>
    <div class="row">本關時間 <span><span id="levelTime">0.00</span>s</span></div>
    <div class="row">累計時間 <span><span id="totalTime">0.00</span>s</span></div>
    <div class="legend"><span style="color:#10b981">● 起點</span>　<span style="color:#f43f5e">● 終點</span></div>
    <button id="restartBtn">重新開始</button>
  </div>

  <div id="centerMessage"></div>

  <div id="joystick-zone">
    <div id="joystick-knob"></div>
  </div>

  <script>
    const { Engine, Render, Runner, World, Bodies, Body, Composite, Events } = Matter;

    const W = window.innerWidth;
    const H = window.innerHeight;

    const engine = Engine.create();
    engine.gravity.y = 0; // 無重力，由玩家控制
    const world = engine.world;

    const render = Render.create({
      element: document.body,
      engine,
      options: {
        width: W,
        height: H,
        wireframes: false,
        background: "transparent"
      }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    const uiEl = document.getElementById("ui");
    const levelTextEl = document.getElementById("levelText");
    const levelTimeEl = document.getElementById("levelTime");
    const totalTimeEl = document.getElementById("totalTime");
    const centerMessageEl = document.getElementById("centerMessage");
    const restartBtn = document.getElementById("restartBtn");

    const TOTAL_LEVELS = 3;
    let currentLevel = 1;
    let totalElapsed = 0;
    let levelStartTs = 0;
    let levelEnded = false;
    let gameFinished = false;

    let ball = null;
    let mazeMetrics = null;
    let startZone = null;
    let goalZone = null;

    // --- 虛擬搖桿與鍵盤輸入狀態 ---
    const keys = { up: false, down: false, left: false, right: false };
    let joyActive = false;
    let joyVector = { x: 0, y: 0 }; // 範圍 -1 到 1

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showMessage(text, duration = 1200) {
      centerMessageEl.textContent = text;
      centerMessageEl.className = "show";
      if (duration > 0) {
        setTimeout(() => { centerMessageEl.className = ""; }, duration);
      }
    }

    function updateUI() {
      levelTextEl.textContent = currentLevel;
      totalTimeEl.textContent = totalElapsed.toFixed(2);
    }

    function clearLevelObjects() {
      const allBodies = Composite.allBodies(world);
      for (const body of allBodies) {
        World.remove(world, body);
      }
      ball = null;
      startZone = null;
      goalZone = null;
      mazeMetrics = null;
    }

    function createBoundaryWalls() {
      const thickness = 40;
      const wallColor = "#0f172a";
      const walls = [
        Bodies.rectangle(W / 2, -thickness / 2, W, thickness, { isStatic: true, render: { fillStyle: wallColor } }),
        Bodies.rectangle(W / 2, H + thickness / 2, W, thickness, { isStatic: true, render: { fillStyle: wallColor } }),
        Bodies.rectangle(-thickness / 2, H / 2, thickness, H, { isStatic: true, render: { fillStyle: wallColor } }),
        Bodies.rectangle(W + thickness / 2, H / 2, thickness, H, { isStatic: true, render: { fillStyle: wallColor } })
      ];
      World.add(world, walls);
    }

    function generateMaze(rows, cols) {
      const grid = Array(rows).fill(null).map(() => Array(cols).fill(false));
      const verticals = Array(rows).fill(null).map(() => Array(cols - 1).fill(true));
      const horizontals = Array(rows - 1).fill(null).map(() => Array(cols).fill(true));

      function stepThroughCell(row, col) {
        if (grid[row][col]) return;
        grid[row][col] = true;

        const neighbors = shuffle([
          [row - 1, col, "up"], [row, col + 1, "right"],
          [row + 1, col, "down"], [row, col - 1, "left"]
        ]);

        for (const [nextRow, nextCol, direction] of neighbors) {
          if (nextRow < 0 || nextRow >= rows || nextCol < 0 || nextCol >= cols) continue;
          if (grid[nextRow][nextCol]) continue;

          if (direction === "left") verticals[row][col - 1] = false;
          else if (direction === "right") verticals[row][col] = false;
          else if (direction === "up") horizontals[row - 1][col] = false;
          else if (direction === "down") horizontals[row][col] = false;

          stepThroughCell(nextRow, nextCol);
        }
      }

      stepThroughCell(randInt(0, rows - 1), randInt(0, cols - 1));
      return { rows, cols, verticals, horizontals };
    }

    function buildMazeLevel(level) {
      clearLevelObjects();
      createBoundaryWalls();
      uiEl.classList.remove("minimized");

      let rows, cols, wallThickness, speed;
      if (level === 1) {
        rows = 7; cols = 10; wallThickness = 12; speed = 2.80;
      } else if (level === 2) {
        rows = 10; cols = 14; wallThickness = 10; speed = 2.65;
      } else {
        rows = 13; cols = 18; wallThickness = 8; speed = 2.50;
      }

      const isMobile = W <= 768;
      const leftPad = isMobile ? Math.max(92, W * 0.10) : Math.max(130, W * 0.11);
      const rightPad = isMobile ? 28 : 50;
      const topPad = isMobile ? 84 : 78;
      const bottomPad = isMobile ? 84 : 66;

      const mazeWidth = W - leftPad - rightPad;
      const mazeHeight = H - topPad - bottomPad;
      const cellW = mazeWidth / cols;
      const cellH = mazeHeight / rows;
      const offsetX = leftPad;
      const offsetY = topPad;

      mazeMetrics = { offsetX, offsetY, mazeWidth, mazeHeight, cellW, cellH };

      // 迷宮底板 (絕對確保 isSensor: true，不產生任何阻力)
      const mazeBg = Bodies.rectangle(
        offsetX + mazeWidth / 2, offsetY + mazeHeight / 2,
        mazeWidth, mazeHeight,
        { isStatic: true, isSensor: true, render: { fillStyle: "rgba(241, 245, 249, 0.7)" } }
      );
      World.add(world, mazeBg);

      const outerWallColor = "#1e293b";
      const innerWallColor = "#475569";
      const maze = generateMaze(rows, cols);

      // 邊框
      World.add(world, [
        Bodies.rectangle(offsetX + mazeWidth / 2, offsetY, mazeWidth + wallThickness, wallThickness, { isStatic: true, render: { fillStyle: outerWallColor } }),
        Bodies.rectangle(offsetX + mazeWidth / 2, offsetY + mazeHeight, mazeWidth + wallThickness, wallThickness, { isStatic: true, render: { fillStyle: outerWallColor } }),
        Bodies.rectangle(offsetX, offsetY + (cellH * 1.15) + (mazeHeight - cellH * 1.15) / 2, wallThickness, (mazeHeight - cellH * 1.15) + wallThickness, { isStatic: true, render: { fillStyle: outerWallColor } }),
        Bodies.rectangle(offsetX + mazeWidth, offsetY + mazeHeight / 2, wallThickness, mazeHeight + wallThickness, { isStatic: true, render: { fillStyle: outerWallColor } })
      ]);

      // 內部牆壁
      maze.verticals.forEach((row, rowIndex) => {
        row.forEach((isWall, colIndex) => {
          if (!isWall) return;
          // 確保起點周遭不會有牆壁阻擋
          if (rowIndex === 0 && colIndex === 0) return;
          World.add(world, Bodies.rectangle(
            offsetX + cellW * (colIndex + 1), offsetY + cellH * rowIndex + cellH / 2,
            wallThickness, cellH + wallThickness,
            { isStatic: true, render: { fillStyle: innerWallColor } }
          ));
        });
      });

      maze.horizontals.forEach((row, rowIndex) => {
        row.forEach((isWall, colIndex) => {
          if (!isWall) return;
          if (rowIndex === 0 && colIndex === 0) return;
          World.add(world, Bodies.rectangle(
            offsetX + cellW * colIndex + cellW / 2, offsetY + cellH * (rowIndex + 1),
            cellW + wallThickness, wallThickness,
            { isStatic: true, render: { fillStyle: innerWallColor } }
          ));
        });
      });

      // 邏輯區域 (沒有實體物理，純感測)
      const startCenterX = offsetX + cellW * 0.5;
      const startCenterY = offsetY + cellH * 0.5;
      const goalCenterX = offsetX + mazeWidth - cellW * 0.5;
      const goalCenterY = offsetY + mazeHeight - cellH * 0.5;
      const triggerRadius = Math.min(cellW, cellH) * 0.35; 

      startZone = { x: startCenterX, y: startCenterY, radius: triggerRadius };
      goalZone = { x: goalCenterX, y: goalCenterY, radius: triggerRadius };

      // 【關鍵修正】進一步縮小球體，並嚴格生成於第一格正中心，徹底避免卡牆
      const radius = Math.min(cellW, cellH) * 0.18; 

      ball = Bodies.circle(startCenterX, startCenterY, radius, {
        label: "player",
        frictionAir: 0.18, // 降低空氣阻力讓滾動更滑順
        restitution: 0.2,  // 增加一點點彈性，碰牆不會死當
        render: { visible: false } 
      });
      ball.moveSpeed = speed;
      World.add(world, ball);

      levelEnded = false;
      levelStartTs = performance.now();
      updateUI();
      showMessage(`第 ${level} 關`);
    }

    function completeLevel() {
      if (levelEnded || gameFinished) return;
      levelEnded = true;
      uiEl.classList.remove("minimized"); 

      const now = performance.now();
      const levelSeconds = (now - levelStartTs) / 1000;
      totalElapsed += levelSeconds;
      updateUI();

      if (currentLevel < TOTAL_LEVELS) {
        showMessage(`恭喜完成第 ${currentLevel} 關！ 🎉`);
        setTimeout(() => {
          currentLevel++;
          buildMazeLevel(currentLevel);
        }, 1500);
      } else {
        gameFinished = true;
        showMessage(`🏆 挑戰成功！總時長：${totalElapsed.toFixed(2)}s`, 0);
      }
    }

    function restartGame() {
      currentLevel = 1;
      totalElapsed = 0;
      gameFinished = false;
      centerMessageEl.className = "";
      buildMazeLevel(currentLevel);
    }

    restartBtn.addEventListener("click", restartGame);

    // --- 搖桿控制器邏輯 ---
    const joyZone = document.getElementById('joystick-zone');
    const joyKnob = document.getElementById('joystick-knob');
    let joyOrigin = { x: 0, y: 0 };
    const maxJoyDist = 45; // 搖桿最大移動半徑

    joyZone.addEventListener('pointerdown', (e) => {
      joyActive = true;
      joyKnob.classList.remove('snap-back'); // 移除回彈動畫，準備跟隨手指
      const rect = joyZone.getBoundingClientRect();
      joyOrigin = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      updateJoystick(e);
      joyZone.setPointerCapture(e.pointerId);
    });

    joyZone.addEventListener('pointermove', (e) => {
      if (!joyActive) return;
      updateJoystick(e);
    });

    const resetJoystick = () => {
      joyActive = false;
      joyVector = { x: 0, y: 0 };
      joyKnob.classList.add('snap-back');
      joyKnob.style.transform = `translate(0px, 0px)`;
    };

    joyZone.addEventListener('pointerup', resetJoystick);
    joyZone.addEventListener('pointercancel', resetJoystick);

    function updateJoystick(e) {
      let dx = e.clientX - joyOrigin.x;
      let dy = e.clientY - joyOrigin.y;
      const dist = Math.hypot(dx, dy);

      // 限制搖桿在圓形範圍內
      if (dist > maxJoyDist) {
        dx = (dx / dist) * maxJoyDist;
        dy = (dy / dist) * maxJoyDist;
      }

      joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
      
      // 正規化為 -1.0 到 1.0 的向量，供物理引擎使用
      joyVector.x = dx / maxJoyDist;
      joyVector.y = dy / maxJoyDist;
    }

    // --- 鍵盤邏輯 ---
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowup", "w"].includes(key)) keys.up = true;
      if (["arrowdown", "s"].includes(key)) keys.down = true;
      if (["arrowleft", "a"].includes(key)) keys.left = true;
      if (["arrowright", "d"].includes(key)) keys.right = true;
    });

    window.addEventListener("keyup", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowup", "w"].includes(key)) keys.up = false;
      if (["arrowdown", "s"].includes(key)) keys.down = false;
      if (["arrowleft", "a"].includes(key)) keys.left = false;
      if (["arrowright", "d"].includes(key)) keys.right = false;
    });

    // --- 遊戲引擎每幀更新邏輯 ---
    Events.on(engine, "beforeUpdate", () => {
      if (!ball || levelEnded || gameFinished) return;

      // 整合搖桿與鍵盤輸入
      let inputX = 0;
      let inputY = 0;

      if (joyActive) {
        inputX = joyVector.x;
        inputY = joyVector.y;
      } else {
        if (keys.left) inputX -= 1;
        if (keys.right) inputX += 1;
        if (keys.up) inputY -= 1;
        if (keys.down) inputY += 1;
        // 鍵盤斜向移動時將向量正規化 (維持總速度一致)
        if (inputX !== 0 && inputY !== 0) {
          inputX *= 0.707;
          inputY *= 0.707;
        }
      }

      // 套用速度
      Body.setVelocity(ball, { 
        x: inputX * ball.moveSpeed, 
        y: inputY * ball.moveSpeed 
      });

      const speed = Math.hypot(ball.velocity.x, ball.velocity.y);
      const isPressing = joyActive || keys.up || keys.down || keys.left || keys.right;
      
      // UI 自動收合判定
      if (speed > 0.5 || isPressing) {
        uiEl.classList.add("minimized");
      } else if (speed < 0.05) {
        uiEl.classList.remove("minimized");
      }

      // 球體滾動視覺旋轉
      if (speed > 0.05) {
        Body.setAngle(ball, ball.angle + speed * 0.04);
      }
      
      // 邏輯區域判斷進洞
      if (goalZone) {
        const distToGoal = Math.hypot(ball.position.x - goalZone.x, ball.position.y - goalZone.y);
        if (distToGoal < goalZone.radius) {
          completeLevel();
        }
      }

      // 時間更新
      const now = performance.now();
      const levelSeconds = (now - levelStartTs) / 1000;
      levelTimeEl.textContent = levelSeconds.toFixed(2);
      totalTimeEl.textContent = (totalElapsed + levelSeconds).toFixed(2);
    });

    // --- 畫布自訂渲染 ---
    Events.on(render, "afterRender", () => {
      const ctx = render.context;
      if (!mazeMetrics) return;
      const { cellW, cellH } = mazeMetrics;

      ctx.save();
      
      ctx.font = `bold ${Math.max(14, Math.min(cellW, cellH) * 0.3)}px Noto Sans TC, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      // 繪製起點
      if (startZone) {
        ctx.beginPath();
        ctx.arc(startZone.x, startZone.y, startZone.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(16, 185, 129, 0.15)";
        ctx.fill();
        ctx.fillStyle = "#059669";
        ctx.fillText("起", startZone.x, startZone.y);
      }

      // 繪製終點
      if (goalZone) {
        ctx.beginPath();
        ctx.arc(goalZone.x, goalZone.y, goalZone.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(244, 63, 94, 0.15)";
        ctx.fill();
        ctx.fillStyle = "#e11d48";
        ctx.fillText("終", goalZone.x, goalZone.y);
        ctx.beginPath();
        ctx.arc(goalZone.x, goalZone.y, goalZone.radius * 1.2, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(225, 29, 72, 0.5)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 繪製立體球
      if (ball) {
        const r = ball.circleRadius;
        const x = ball.position.x;
        const y = ball.position.y;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(ball.angle);
        
        ctx.shadowColor = "#3b82f6";
        ctx.shadowBlur = 12;

        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = "#1e3a8a"; 
        ctx.fill();
        
        ctx.shadowBlur = 0; 
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI);
        ctx.fillStyle = "#60a5fa"; 
        ctx.fill();
        ctx.beginPath();
        ctx.arc(r / 2, 0, r / 2, 0, Math.PI, true);
        ctx.fillStyle = "#1e3a8a"; 
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-r / 2, 0, r / 2, 0, Math.PI, false);
        ctx.fillStyle = "#60a5fa"; 
        ctx.fill();
        ctx.restore(); 

        ctx.save();
        ctx.translate(x, y);
        const gradient = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
        gradient.addColorStop(0, "rgba(255, 255, 255, 0.7)");
        gradient.addColorStop(0.4, "rgba(255, 255, 255, 0.1)");
        gradient.addColorStop(1, "rgba(0, 0, 0, 0.6)");
        
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.restore();
      }
      ctx.restore(); 
    });

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => location.reload(), 200);
    });

    restartGame();
  </script>
</body>
</html>
