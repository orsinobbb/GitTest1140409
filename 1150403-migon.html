<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Matter.js 隨機迷宮三關挑戰（手機方向控制器版）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #eaf6ff 0%, #d9efff 50%, #f8fbff 100%);
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 30;
      background: rgba(255,255,255,0.9);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      min-width: 220px;
      max-width: min(92vw, 300px);
    }

    #ui h1 {
      margin: 0 0 8px 0;
      font-size: 19px;
      line-height: 1.2;
    }

    #ui .row {
      margin: 5px 0;
      font-size: 14px;
      color: #1f2937;
    }

    #ui .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #4b5563;
      line-height: 1.45;
    }

    #ui button {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: bold;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    #centerMessage {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(17,24,39,0.82);
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 17px;
      display: none;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    canvas {
      display: block;
    }

    /* 手機半透明方向控制器 */
    #dpad {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 35;
      width: 170px;
      height: 170px;
      user-select: none;
      touch-action: none;
    }

    #dpad .pad-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(30, 41, 59, 0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: white;
      font-size: 28px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }

    #dpad .pad-btn.active {
      background: rgba(37, 99, 235, 0.5);
      transform: scale(0.96);
    }

    #pad-up    { left: 57px; top: 0; }
    #pad-left  { left: 0; top: 57px; }
    #pad-right { right: 0; top: 57px; }
    #pad-down  { left: 57px; bottom: 0; }

    /* 手機時 UI 再縮小一點 */
    @media (max-width: 768px) {
      #ui {
        top: 10px;
        left: 10px;
        padding: 10px 12px;
        min-width: 190px;
      }

      #ui h1 {
        font-size: 17px;
      }

      #ui .row {
        font-size: 13px;
      }

      #ui .hint {
        font-size: 11px;
      }

      #dpad {
        width: 156px;
        height: 156px;
        left: 12px;
        bottom: 12px;
      }

      #dpad .pad-btn {
        width: 52px;
        height: 52px;
        font-size: 24px;
      }

      #pad-up    { left: 52px; top: 0; }
      #pad-left  { left: 0; top: 52px; }
      #pad-right { right: 0; top: 52px; }
      #pad-down  { left: 52px; bottom: 0; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>🧩 隨機迷宮三關挑戰</h1>
    <div class="row">目前關卡：<span id="levelText">1 / 3</span></div>
    <div class="row">本關時間：<span id="levelTime">0.00</span> 秒</div>
    <div class="row">總時間：<span id="totalTime">0.00</span> 秒</div>
    <div class="row">起點：🟩　終點：🟥</div>
    <div class="hint">
      電腦：方向鍵 / WASD<br>
      手機：左下角半透明方向鍵
    </div>
    <button id="restartBtn">重新開始三關挑戰</button>
  </div>

  <div id="centerMessage"></div>

  <div id="dpad">
    <div class="pad-btn" id="pad-up">▲</div>
    <div class="pad-btn" id="pad-left">◀</div>
    <div class="pad-btn" id="pad-right">▶</div>
    <div class="pad-btn" id="pad-down">▼</div>
  </div>

  <script>
    const {
      Engine,
      Render,
      Runner,
      World,
      Bodies,
      Body,
      Composite,
      Events
    } = Matter;

    const W = window.innerWidth;
    const H = window.innerHeight;

    const engine = Engine.create();
    engine.gravity.y = 0;
    const world = engine.world;

    const render = Render.create({
      element: document.body,
      engine,
      options: {
        width: W,
        height: H,
        wireframes: false,
        background: "transparent"
      }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    const levelTextEl = document.getElementById("levelText");
    const levelTimeEl = document.getElementById("levelTime");
    const totalTimeEl = document.getElementById("totalTime");
    const centerMessageEl = document.getElementById("centerMessage");
    const restartBtn = document.getElementById("restartBtn");

    const TOTAL_LEVELS = 3;
    let currentLevel = 1;
    let totalElapsed = 0;
    let levelStartTs = 0;
    let levelEnded = false;
    let gameFinished = false;

    let ball = null;
    let goalSensor = null;

    const pressed = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showMessage(text, duration = 1400) {
      centerMessageEl.textContent = text;
      centerMessageEl.style.display = "block";
      if (duration > 0) {
        setTimeout(() => {
          centerMessageEl.style.display = "none";
        }, duration);
      }
    }

    function updateUI() {
      levelTextEl.textContent = `${currentLevel} / ${TOTAL_LEVELS}`;
      totalTimeEl.textContent = totalElapsed.toFixed(2);
    }

    function clearLevelObjects() {
      const allBodies = Composite.allBodies(world);
      for (const body of allBodies) {
        World.remove(world, body);
      }
      ball = null;
      goalSensor = null;
    }

    function createBoundaryWalls() {
      const thickness = 30;
      const walls = [
        Bodies.rectangle(W / 2, -thickness / 2, W, thickness, {
          isStatic: true,
          render: { fillStyle: "#334155" }
        }),
        Bodies.rectangle(W / 2, H + thickness / 2, W, thickness, {
          isStatic: true,
          render: { fillStyle: "#334155" }
        }),
        Bodies.rectangle(-thickness / 2, H / 2, thickness, H, {
          isStatic: true,
          render: { fillStyle: "#334155" }
        }),
        Bodies.rectangle(W + thickness / 2, H / 2, thickness, H, {
          isStatic: true,
          render: { fillStyle: "#334155" }
        })
      ];
      World.add(world, walls);
    }

    function generateMaze(rows, cols) {
      const grid = Array(rows).fill(null).map(() => Array(cols).fill(false));
      const verticals = Array(rows).fill(null).map(() => Array(cols - 1).fill(true));
      const horizontals = Array(rows - 1).fill(null).map(() => Array(cols).fill(true));

      function stepThroughCell(row, col) {
        if (grid[row][col]) return;
        grid[row][col] = true;

        const neighbors = shuffle([
          [row - 1, col, "up"],
          [row, col + 1, "right"],
          [row + 1, col, "down"],
          [row, col - 1, "left"]
        ]);

        for (const [nextRow, nextCol, direction] of neighbors) {
          if (
            nextRow < 0 || nextRow >= rows ||
            nextCol < 0 || nextCol >= cols
          ) continue;

          if (grid[nextRow][nextCol]) continue;

          if (direction === "left") verticals[row][col - 1] = false;
          else if (direction === "right") verticals[row][col] = false;
          else if (direction === "up") horizontals[row - 1][col] = false;
          else if (direction === "down") horizontals[row][col] = false;

          stepThroughCell(nextRow, nextCol);
        }
      }

      stepThroughCell(randInt(0, rows - 1), randInt(0, cols - 1));
      return { rows, cols, verticals, horizontals };
    }

    function buildMazeLevel(level) {
      clearLevelObjects();
      createBoundaryWalls();

      let rows, cols, wallThickness, speed;
      if (level === 1) {
        rows = 7;
        cols = 10;
        wallThickness = 8;
        speed = 2.55;
      } else if (level === 2) {
        rows = 10;
        cols = 14;
        wallThickness = 7;
        speed = 2.4;
      } else {
        rows = 13;
        cols = 18;
        wallThickness = 6;
        speed = 2.2;
      }

      const maze = generateMaze(rows, cols);

      const leftPad = Math.max(100, W * 0.12);
      const rightPad = Math.max(40, W * 0.06);
      const topPad = Math.max(70, H * 0.1);
      const bottomPad = Math.max(70, H * 0.1);

      const mazeWidth = W - leftPad - rightPad;
      const mazeHeight = H - topPad - bottomPad;

      const cellW = mazeWidth / cols;
      const cellH = mazeHeight / rows;

      const offsetX = leftPad;
      const offsetY = topPad;

      const mazeBg = Bodies.rectangle(
        offsetX + mazeWidth / 2,
        offsetY + mazeHeight / 2,
        mazeWidth,
        mazeHeight,
        {
          isStatic: true,
          render: { fillStyle: "#f8fbff" }
        }
      );
      World.add(world, mazeBg);

      const startRect = Bodies.rectangle(
        offsetX + cellW / 2,
        offsetY + cellH / 2,
        cellW * 0.8,
        cellH * 0.8,
        {
          isStatic: true,
          isSensor: true,
          label: "start",
          render: { fillStyle: "#86efac" }
        }
      );
      World.add(world, startRect);

      goalSensor = Bodies.rectangle(
        offsetX + mazeWidth - cellW / 2,
        offsetY + mazeHeight - cellH / 2,
        cellW * 0.8,
        cellH * 0.8,
        {
          isStatic: true,
          isSensor: true,
          label: "goal",
          render: { fillStyle: "#f87171" }
        }
      );
      World.add(world, goalSensor);

      const frameTop = Bodies.rectangle(
        offsetX + mazeWidth / 2, offsetY, mazeWidth, wallThickness,
        { isStatic: true, render: { fillStyle: "#1e293b" } }
      );
      const frameBottom = Bodies.rectangle(
        offsetX + mazeWidth / 2, offsetY + mazeHeight, mazeWidth, wallThickness,
        { isStatic: true, render: { fillStyle: "#1e293b" } }
      );
      const frameLeft = Bodies.rectangle(
        offsetX, offsetY + mazeHeight / 2, wallThickness, mazeHeight,
        { isStatic: true, render: { fillStyle: "#1e293b" } }
      );
      const frameRight = Bodies.rectangle(
        offsetX + mazeWidth, offsetY + mazeHeight / 2, wallThickness, mazeHeight,
        { isStatic: true, render: { fillStyle: "#1e293b" } }
      );
      World.add(world, [frameTop, frameBottom, frameLeft, frameRight]);

      maze.verticals.forEach((row, rowIndex) => {
        row.forEach((isWall, colIndex) => {
          if (!isWall) return;
          const wall = Bodies.rectangle(
            offsetX + cellW * (colIndex + 1),
            offsetY + cellH * rowIndex + cellH / 2,
            wallThickness,
            cellH + wallThickness,
            {
              isStatic: true,
              render: { fillStyle: "#475569" }
            }
          );
          World.add(world, wall);
        });
      });

      maze.horizontals.forEach((row, rowIndex) => {
        row.forEach((isWall, colIndex) => {
          if (!isWall) return;
          const wall = Bodies.rectangle(
            offsetX + cellW * colIndex + cellW / 2,
            offsetY + cellH * (rowIndex + 1),
            cellW + wallThickness,
            wallThickness,
            {
              isStatic: true,
              render: { fillStyle: "#475569" }
            }
          );
          World.add(world, wall);
        });
      });

      const radius = Math.min(cellW, cellH) * 0.23;
      ball = Bodies.circle(
        offsetX + cellW / 2,
        offsetY + cellH / 2,
        radius,
        {
          label: "player",
          frictionAir: 0.22,
          restitution: 0.05,
          inertia: Infinity,
          render: { fillStyle: "#3b82f6" }
        }
      );
      ball.moveSpeed = speed;
      World.add(world, ball);

      levelEnded = false;
      levelStartTs = performance.now();
      updateUI();

      showMessage(`第 ${level} 關開始`, 1200);
    }

    function completeLevel() {
      if (levelEnded || gameFinished) return;
      levelEnded = true;

      const now = performance.now();
      const levelSeconds = (now - levelStartTs) / 1000;
      totalElapsed += levelSeconds;
      updateUI();

      if (currentLevel < TOTAL_LEVELS) {
        showMessage(`第 ${currentLevel} 關完成！`, 1200);
        setTimeout(() => {
          currentLevel++;
          buildMazeLevel(currentLevel);
        }, 1250);
      } else {
        gameFinished = true;
        showMessage(`🏆 全部完成！總時間 ${totalElapsed.toFixed(2)} 秒`, 0);
      }
    }

    function restartGame() {
      currentLevel = 1;
      totalElapsed = 0;
      gameFinished = false;
      centerMessageEl.style.display = "none";
      resetPressed();
      buildMazeLevel(currentLevel);
    }

    function resetPressed() {
      pressed.up = false;
      pressed.down = false;
      pressed.left = false;
      pressed.right = false;
      document.querySelectorAll(".pad-btn").forEach(btn => btn.classList.remove("active"));
    }

    function handleInput() {
      if (!ball || levelEnded || gameFinished) return;

      let vx = 0;
      let vy = 0;

      if (pressed.up) vy -= ball.moveSpeed;
      if (pressed.down) vy += ball.moveSpeed;
      if (pressed.left) vx -= ball.moveSpeed;
      if (pressed.right) vx += ball.moveSpeed;

      if (vx !== 0 && vy !== 0) {
        vx *= 0.72;
        vy *= 0.72;
      }

      Body.setVelocity(ball, { x: vx, y: vy });
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowup", "w"].includes(key)) pressed.up = true;
      if (["arrowdown", "s"].includes(key)) pressed.down = true;
      if (["arrowleft", "a"].includes(key)) pressed.left = true;
      if (["arrowright", "d"].includes(key)) pressed.right = true;
    });

    window.addEventListener("keyup", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowup", "w"].includes(key)) pressed.up = false;
      if (["arrowdown", "s"].includes(key)) pressed.down = false;
      if (["arrowleft", "a"].includes(key)) pressed.left = false;
      if (["arrowright", "d"].includes(key)) pressed.right = false;
    });

    restartBtn.addEventListener("click", restartGame);

    function bindPad(id, dirKey) {
      const el = document.getElementById(id);

      const start = (ev) => {
        ev.preventDefault();
        pressed[dirKey] = true;
        el.classList.add("active");
      };

      const end = (ev) => {
        ev.preventDefault();
        pressed[dirKey] = false;
        el.classList.remove("active");
      };

      el.addEventListener("touchstart", start, { passive: false });
      el.addEventListener("touchend", end, { passive: false });
      el.addEventListener("touchcancel", end, { passive: false });

      el.addEventListener("mousedown", start);
      el.addEventListener("mouseup", end);
      el.addEventListener("mouseleave", () => {
        pressed[dirKey] = false;
        el.classList.remove("active");
      });
    }

    bindPad("pad-up", "up");
    bindPad("pad-down", "down");
    bindPad("pad-left", "left");
    bindPad("pad-right", "right");

    document.body.addEventListener("touchend", (e) => {
      if (!e.target.closest("#dpad")) return;
    }, { passive: false });

    Events.on(engine, "beforeUpdate", () => {
      handleInput();

      if (!levelEnded && !gameFinished) {
        const now = performance.now();
        const levelSeconds = (now - levelStartTs) / 1000;
        levelTimeEl.textContent = levelSeconds.toFixed(2);
        totalTimeEl.textContent = (totalElapsed + levelSeconds).toFixed(2);
      }
    });

    Events.on(engine, "collisionStart", (event) => {
      if (!ball || !goalSensor || levelEnded || gameFinished) return;

      for (const pair of event.pairs) {
        const labels = [pair.bodyA.label, pair.bodyB.label];
        if (labels.includes("player") && labels.includes("goal")) {
          completeLevel();
          break;
        }
      }
    });

    Events.on(render, "afterRender", () => {
      const ctx = render.context;
      if (!ball) return;

      ctx.beginPath();
      ctx.arc(ball.position.x, ball.position.y, ball.circleRadius + 6, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(59,130,246,0.16)";
      ctx.fill();

      const bodies = Composite.allBodies(world);
      const startBody = bodies.find(b => b.label === "start");

      ctx.save();
      ctx.font = "bold 18px Noto Sans TC, Microsoft JhengHei, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      if (startBody) {
        ctx.fillStyle = "#166534";
        ctx.fillText("起點", startBody.position.x, startBody.position.y);
      }

      if (goalSensor) {
        ctx.fillStyle = "#991b1b";
        ctx.fillText("終點", goalSensor.position.x, goalSensor.position.y);
      }

      ctx.restore();
    });

    window.addEventListener("blur", resetPressed);
    window.addEventListener("resize", () => location.reload());

    restartGame();
  </script>
</body>
</html>
