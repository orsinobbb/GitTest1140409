<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matter.js 發射遊戲完整版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(to bottom, #87ceeb 0%, #dff3ff 55%, #d8c9a3 56%, #b6945f 100%);
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      overflow: hidden;
    }

    #game-ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      min-width: 220px;
    }

    #game-ui h1 {
      font-size: 20px;
      margin: 0 0 8px 0;
    }

    #game-ui .row {
      margin: 6px 0;
      font-size: 15px;
    }

    #restartBtn {
      margin-top: 10px;
      width: 100%;
      border: none;
      background: #2d7ef7;
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    #restartBtn:hover {
      background: #1767da;
    }

    #message {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 18px;
      display: none;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-ui">
    <h1>🎯 發射攻城遊戲</h1>
    <div class="row">分數：<span id="score">0</span></div>
    <div class="row">剩餘彈藥：<span id="ammo">5</span></div>
    <div class="row">剩餘敵人：<span id="targets">0</span></div>
    <div class="row">玩法：拖曳左邊彈球後放開</div>
    <button id="restartBtn">重新開始</button>
  </div>

  <div id="message"></div>

  <script>
    const {
      Engine,
      Render,
      Runner,
      World,
      Bodies,
      Body,
      Composite,
      Constraint,
      Mouse,
      MouseConstraint,
      Events,
      Query
    } = Matter;

    const WIDTH = window.innerWidth;
    const HEIGHT = window.innerHeight;

    const engine = Engine.create();
    const world = engine.world;
    engine.gravity.y = 1;

    const render = Render.create({
      element: document.body,
      engine: engine,
      options: {
        width: WIDTH,
        height: HEIGHT,
        wireframes: false,
        background: "transparent"
      }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    const scoreEl = document.getElementById("score");
    const ammoEl = document.getElementById("ammo");
    const targetsEl = document.getElementById("targets");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restartBtn");

    let score = 0;
    let ammo = 5;
    let gameOver = false;

    let currentBall = null;
    let sling = null;
    let mouseConstraint = null;

    const targets = [];
    const explosives = [];
    const scoredBodies = new Set();

    const slingAnchor = { x: 180, y: HEIGHT - 180 };

    function updateUI() {
      scoreEl.textContent = score;
      ammoEl.textContent = ammo;
      const aliveTargets = targets.filter(t => !t.isRemoved).length;
      targetsEl.textContent = aliveTargets;
    }

    function showMessage(text) {
      messageEl.textContent = text;
      messageEl.style.display = "block";
    }

    function hideMessage() {
      messageEl.style.display = "none";
    }

    function addScore(value) {
      score += value;
      updateUI();
    }

    function createGroundAndWalls() {
      const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 20, WIDTH, 40, {
        isStatic: true,
        render: { fillStyle: "#7d5a36" }
      });

      const leftWall = Bodies.rectangle(-20, HEIGHT / 2, 40, HEIGHT, {
        isStatic: true,
        render: { visible: false }
      });

      const rightWall = Bodies.rectangle(WIDTH + 20, HEIGHT / 2, 40, HEIGHT, {
        isStatic: true,
        render: { visible: false }
      });

      const topWall = Bodies.rectangle(WIDTH / 2, -20, WIDTH, 40, {
        isStatic: true,
        render: { visible: false }
      });

      World.add(world, [ground, leftWall, rightWall, topWall]);
    }

    function createStand() {
      const base = Bodies.rectangle(slingAnchor.x, slingAnchor.y + 40, 100, 20, {
        isStatic: true,
        render: { fillStyle: "#6d4c41" }
      });

      const pole = Bodies.rectangle(slingAnchor.x, slingAnchor.y - 20, 20, 100, {
        isStatic: true,
        render: { fillStyle: "#8d6e63" }
      });

      World.add(world, [base, pole]);
    }

    function createBox(x, y, w, h, color = "#c98f4a") {
      return Bodies.rectangle(x, y, w, h, {
        density: 0.002,
        friction: 0.6,
        restitution: 0.1,
        render: { fillStyle: color }
      });
    }

    function createTarget(x, y) {
      const target = Bodies.circle(x, y, 18, {
        density: 0.002,
        restitution: 0.3,
        friction: 0.5,
        label: "target",
        render: { fillStyle: "#7cb342" }
      });
      target.hp = 100;
      target.isRemoved = false;
      targets.push(target);
      return target;
    }

    function createExplosiveBox(x, y) {
      const bomb = Bodies.rectangle(x, y, 36, 36, {
        density: 0.002,
        restitution: 0.2,
        friction: 0.6,
        label: "explosive",
        render: { fillStyle: "#d32f2f" }
      });
      bomb.isExploded = false;
      explosives.push(bomb);
      return bomb;
    }

    function buildCastle() {
      const baseX = WIDTH - 320;
      const baseY = HEIGHT - 60;

      const bodies = [];

      // 左塔
      bodies.push(createBox(baseX, baseY - 20, 40, 40));
      bodies.push(createBox(baseX, baseY - 65, 40, 40));
      bodies.push(createBox(baseX, baseY - 110, 40, 40));

      // 右塔
      bodies.push(createBox(baseX + 120, baseY - 20, 40, 40));
      bodies.push(createBox(baseX + 120, baseY - 65, 40, 40));
      bodies.push(createBox(baseX + 120, baseY - 110, 40, 40));

      // 中間橫梁
      bodies.push(createBox(baseX + 60, baseY - 140, 160, 20, "#a56d39"));

      // 中間平台
      bodies.push(createBox(baseX + 60, baseY - 90, 100, 20, "#a56d39"));

      // 中間底層
      bodies.push(createBox(baseX + 60, baseY - 20, 100, 20, "#a56d39"));

      // 敵人
      bodies.push(createTarget(baseX, baseY - 150));
      bodies.push(createTarget(baseX + 120, baseY - 150));
      bodies.push(createTarget(baseX + 60, baseY - 115));

      // 爆炸箱
      bodies.push(createExplosiveBox(baseX + 60, baseY - 55));

      World.add(world, bodies);
    }

    function createBall() {
      const ball = Bodies.circle(slingAnchor.x, slingAnchor.y, 20, {
        density: 0.004,
        friction: 0.005,
        restitution: 0.8,
        label: "ball",
        render: { fillStyle: "#4fc3f7" }
      });
      ball.isLaunched = false;
      ball.hasSpawnedNext = false;
      return ball;
    }

    function attachBall(ball) {
      currentBall = ball;
      sling = Constraint.create({
        pointA: slingAnchor,
        bodyB: currentBall,
        stiffness: 0.08,
        damping: 0.02,
        render: {
          strokeStyle: "#5d4037",
          lineWidth: 6
        }
      });
      World.add(world, [currentBall, sling]);
    }

    function spawnNextBall() {
      if (ammo <= 0 || gameOver) return;
      const ball = createBall();
      attachBall(ball);
    }

    function releaseBall() {
      if (!currentBall || currentBall.isLaunched) return;
      currentBall.isLaunched = true;
      if (sling) {
        sling.bodyB = null;
      }
    }

    function triggerExplosion(sourceBody, radius = 140, power = 0.03) {
      if (!sourceBody || sourceBody.isExploded) return;
      sourceBody.isExploded = true;
      sourceBody.render.fillStyle = "#ffeb3b";

      const allBodies = Composite.allBodies(world);

      for (const body of allBodies) {
        if (body.isStatic || body === sourceBody) continue;

        const dx = body.position.x - sourceBody.position.x;
        const dy = body.position.y - sourceBody.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > radius || dist === 0) continue;

        const forceMagnitude = (1 - dist / radius) * power;
        const fx = (dx / dist) * forceMagnitude;
        const fy = (dy / dist) * forceMagnitude;

        Body.applyForce(body, body.position, { x: fx, y: fy });

        if (body.label === "target") {
          body.hp -= 80;
        }
      }

      setTimeout(() => {
        World.remove(world, sourceBody);
      }, 80);
    }

    function removeTarget(target) {
      if (!target || target.isRemoved) return;
      target.isRemoved = true;
      addScore(500);
      World.remove(world, target);
      updateUI();
      checkGameResult();
    }

    function handleScoringForFallenObjects() {
      const allBodies = Composite.allBodies(world);

      for (const body of allBodies) {
        if (body.isStatic) continue;
        if (body.label === "ball") continue;
        if (body.label === "target") continue;
        if (body.label === "explosive") continue;

        if (body.position.y > HEIGHT - 25 && !scoredBodies.has(body.id)) {
          scoredBodies.add(body.id);
          addScore(50);
        }
      }
    }

    function checkTargetsHealth() {
      for (const target of targets) {
        if (target.isRemoved) continue;

        if (target.hp <= 0 || target.position.y > HEIGHT + 50) {
          removeTarget(target);
        }
      }
    }

    function checkExplosivesHit(event) {
      for (const pair of event.pairs) {
        const a = pair.bodyA;
        const b = pair.bodyB;

        const hitExplosiveA = a.label === "explosive" && !a.isExploded;
        const hitExplosiveB = b.label === "explosive" && !b.isExploded;

        if (hitExplosiveA && pair.collision.depth > 1) {
          triggerExplosion(a);
        }
        if (hitExplosiveB && pair.collision.depth > 1) {
          triggerExplosion(b);
        }

        if (a.label === "target" && b.label === "ball") {
          a.hp -= 35;
        }
        if (b.label === "target" && a.label === "ball") {
          b.hp -= 35;
        }
      }
    }

    function checkGameResult() {
      const aliveTargets = targets.filter(t => !t.isRemoved).length;

      if (aliveTargets === 0) {
        gameOver = true;
        showMessage("🎉 你贏了！");
        return;
      }

      if (ammo <= 0) {
        const ballsStillMoving = Composite.allBodies(world).some(body =>
          body.label === "ball" &&
          (Math.abs(body.velocity.x) > 0.3 || Math.abs(body.velocity.y) > 0.3)
        );

        if (!ballsStillMoving && !currentBall) {
          gameOver = true;
          showMessage("💥 彈藥用完，遊戲結束");
        }
      }
    }

    function setupMouse() {
      const mouse = Mouse.create(render.canvas);

      mouseConstraint = MouseConstraint.create(engine, {
        mouse,
        constraint: {
          stiffness: 0.03,
          render: { visible: false }
        }
      });

      World.add(world, mouseConstraint);

      Events.on(mouseConstraint, "startdrag", function(event) {
        if (event.body !== currentBall) return;
        hideMessage();
      });

      Events.on(mouseConstraint, "enddrag", function(event) {
        if (event.body === currentBall) {
          releaseBall();
        }
      });

      render.mouse = mouse;
    }

    function clearWorld() {
      World.clear(world, false);
      Engine.clear(engine);

      targets.length = 0;
      explosives.length = 0;
      scoredBodies.clear();

      score = 0;
      ammo = 5;
      gameOver = false;
      currentBall = null;
      sling = null;
      mouseConstraint = null;
      hideMessage();
    }

    function init() {
      clearWorld();
      createGroundAndWalls();
      createStand();
      buildCastle();
      spawnNextBall();
      setupMouse();
      updateUI();
    }

    Events.on(engine, "afterUpdate", function() {
      if (gameOver) return;

      handleScoringForFallenObjects();
      checkTargetsHealth();

      if (currentBall) {
        const ballFarEnough =
          currentBall.isLaunched &&
          (
            currentBall.position.x > slingAnchor.x + 40 ||
            currentBall.position.y < slingAnchor.y - 20 ||
            Math.abs(currentBall.velocity.x) > 2
          );

        if (ballFarEnough && !currentBall.hasSpawnedNext) {
          currentBall.hasSpawnedNext = true;
          ammo--;
          updateUI();

          const oldBall = currentBall;
          currentBall = null;

          if (ammo > 0) {
            spawnNextBall();
          }

          checkGameResult();

          // 避免球太多卡在左邊
          setTimeout(() => {
            if (oldBall && oldBall.position.y > HEIGHT + 200) {
              World.remove(world, oldBall);
            }
          }, 2000);
        }
      }

      checkGameResult();
    });

    Events.on(engine, "collisionStart", function(event) {
      checkExplosivesHit(event);
    });

    restartBtn.addEventListener("click", init);

    window.addEventListener("resize", () => {
      location.reload();
    });

    init();
  </script>
</body>
</html>
